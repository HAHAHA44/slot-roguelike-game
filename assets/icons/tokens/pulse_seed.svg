<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Central energy seed -->
  <circle cx="32" cy="32" r="10" fill="white"/>
  <!-- Cardinal rays -->
  <line x1="32" y1="4" x2="32" y2="18" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="46" x2="32" y2="60" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="4" y1="32" x2="18" y2="32" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="46" y1="32" x2="60" y2="32" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Diagonal charge dots -->
  <circle cx="14" cy="14" r="3" fill="white" opacity="0.6"/>
  <circle cx="50" cy="14" r="3" fill="white" opacity="0.6"/>
  <circle cx="14" cy="50" r="3" fill="white" opacity="0.6"/>
  <circle cx="50" cy="50" r="3" fill="white" opacity="0.6"/>
</svg>
