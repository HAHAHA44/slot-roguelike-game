<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Prism triangle -->
  <polygon points="32,6 58,54 6,54"
           fill="none" stroke="white" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Vertex connection dots -->
  <circle cx="32" cy="6" r="4" fill="white"/>
  <circle cx="58" cy="54" r="4" fill="white"/>
  <circle cx="6" cy="54" r="4" fill="white"/>
  <!-- Internal link line -->
  <line x1="32" y1="28" x2="32" y2="54" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6" stroke-dasharray="4,3"/>
</svg>
